<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Campus Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .offline-container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            margin: 20px;
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        
        .cached-data {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .offline-icon {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>It seems you've lost your internet connection.<br>
        Don't worry! You can still access previously loaded content.</p>
        
        <button class="btn" onclick="retryConnection()">Try Again</button>
        <button class="btn btn-secondary" onclick="goToDashboard()">Go to Dashboard</button>
        
        <div class="cached-data" id="cachedInfo">
            <p>💾 Checking cached data...</p>
        </div>
    </div>
    
    <script>
        async function retryConnection() {
            if (navigator.onLine) {
                window.location.href = '/legacy/dashboard.html';
            } else {
                alert('Still offline. Please check your connection.');
            }
        }
        
        function goToDashboard() {
            window.location.href = '/legacy/dashboard.html';
        }
        
        // Check and display cached data info
        async function getCachedInfo() {
            if ('caches' in window) {
                const cache = await caches.open('campus-connect-v1');
                const keys = await cache.keys();
                const cachedDiv = document.getElementById('cachedInfo');
                
                if (keys.length > 0) {
                    cachedDiv.innerHTML = `
                        <p>✅ Found ${keys.length} cached items</p>
                        <p style="font-size:0.8rem; margin-top:10px;">You can still access:<br>
                        ${keys.slice(0, 3).map(k => k.url.split('/').pop()).join(', ')}</p>
                    `;
                } else {
                    cachedDiv.innerHTML = '<p>⚠️ No cached data available</p>';
                }
            }
        }
        
        getCachedInfo();
        
        // Listen for online event
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
