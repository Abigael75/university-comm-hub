<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - University Comm Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h2 { margin-bottom: 30px; text-align: center; font-size: 1.2em; }
        .sidebar nav a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 5px 0;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .sidebar nav a:hover { background: rgba(255,255,255,0.2); }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #34495e;
            color: white;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #c0392b; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .alert-item {
            background: #fef9e7;
            padding: 15px;
            border-left: 4px solid #f39c12;
            margin-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 { font-size: 2em; margin-bottom: 10px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>👑 ADMIN HUB</h2>
        <nav>
            <a href="#" onclick="showSection('dashboard')">📊 DASHBOARD</a>
            <a href="#" onclick="showSection('users')">👥 USER MANAGEMENT</a>
            <a href="#" onclick="showSection('alerts')">⚠️ SYSTEM ALERTS</a>
            <a href="#" onclick="showSection('comms')">📢 CAMPUS-WIDE COMMS</a>
            <a href="#" onclick="showSection('reports')">📊 REPORTS</a>
        </nav>
    </div>
    <div class="main-content">
        <div class="header">
            <h2>Welcome, <span id="userName"></span>!</h2>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="dashboard" class="section">
            <div class="stats-grid">
                <div class="stat-card"><h3 id="totalUsers">0</h3><p>Total Users</p></div>
                <div class="stat-card"><h3 id="totalCourses">0</h3><p>Active Courses</p></div>
                <div class="stat-card"><h3 id="totalMessages">0</h3><p>Messages Sent</p></div>
            </div>
        </div>

        <div id="users" class="section" style="display:none;">
            <div class="card">
                <h3>User Management</h3>
                <table>
                    <thead>
                        <tr><th>Email</th><th>Name</th><th>Role</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>

        <div id="alerts" class="section" style="display:none;">
            <div class="card">
                <h3>System Alerts</h3>
                <div id="alertsList"></div>
                <button onclick="addSystemAlert()">+ Add Alert</button>
            </div>
        </div>

        <div id="comms" class="section" style="display:none;">
            <div class="card">
                <h3>Campus-Wide Communication</h3>
                <select id="audienceSelect">
                    <option>All Users</option>
                    <option>Students Only</option>
                    <option>Lecturers Only</option>
                    <option>Admins Only</option>
                </select>
                <input type="text" id="announcementTitle" placeholder="Announcement Title">
                <textarea id="announcementMessage" rows="4" placeholder="Announcement Message"></textarea>
                <button onclick="sendAnnouncement()">Send Announcement</button>
            </div>
            <div class="card">
                <h3>Recent Announcements</h3>
                <div id="recentAnnouncements"></div>
            </div>
        </div>

        <div id="reports" class="section" style="display:none;">
            <div class="card">
                <h3>System Reports</h3>
                <div id="reportsData"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/index.html';
        }
        
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').textContent = user.name || 'Admin';
        
        const users = [
            { email: 'student@test.com', name: 'John Student', role: 'student', status: 'Active' },
            { email: 'lecturer@test.com', name: 'Prof. Smith', role: 'lecturer', status: 'Active' },
            { email: 'admin@test.com', name: 'Admin User', role: 'admin', status: 'Active' }
        ];
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
            if (section === 'users') loadUsers();
            if (section === 'dashboard') loadDashboard();
            if (section === 'alerts') loadAlerts();
            if (section === 'comms') loadAnnouncements();
            if (section === 'reports') loadReports();
        }
        
        function loadDashboard() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalCourses').textContent = '12';
            document.getElementById('totalMessages').textContent = '1,247';
        }
        
        function loadUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = users.map(u => `
                <tr>
                    <td>${u.email}</td>
                    <td>${u.name}</td>
                    <td>${u.role}</td>
                    <td><span style="color: green;">${u.status}</span></td>
                    <td><button onclick="editUser('${u.email}')">Edit</button></td>
                </tr>
            `).join('');
        }
        
        function loadAlerts() {
            document.getElementById('alertsList').innerHTML = `
                <div class="alert-item">⚠️ Server maintenance scheduled for Sunday 2 AM</div>
                <div class="alert-item">⚠️ Database backup completed successfully</div>
                <div class="alert-item">⚠️ New user registration spike detected</div>
            `;
        }
        
        function loadAnnouncements() {
            document.getElementById('recentAnnouncements').innerHTML = `
                <div class="alert-item">📢 Exam schedule released - Sent to all students</div>
                <div class="alert-item">📢 Faculty meeting on Friday - Sent to lecturers</div>
            `;
        }
        
        function loadReports() {
            document.getElementById('reportsData').innerHTML = `
                <p><strong>Total Users:</strong> ${users.length}</p>
                <p><strong>Active Courses:</strong> 12</p>
                <p><strong>Messages Sent:</strong> 1,247</p>
                <p><strong>System Uptime:</strong> 99.9%</p>
                <p><strong>Storage Used:</strong> 45GB / 100GB</p>
            `;
        }
        
        function editUser(email) {
            alert(`Edit user: ${email}`);
        }
        
        function addSystemAlert() {
            const alertMsg = prompt('Enter alert message:');
            if (alertMsg) {
                alert(`Alert added successfully: ${alertMsg}`);
                loadAlerts();
            }
        }
        
        function sendAnnouncement() {
            const audience = document.getElementById('audienceSelect').value;
            const title = document.getElementById('announcementTitle').value;
            const message = document.getElementById('announcementMessage').value;
            if (title && message) {
                alert(`Announcement sent to ${audience}: ${title}`);
                document.getElementById('announcementTitle').value = '';
                document.getElementById('announcementMessage').value = '';
                loadAnnouncements();
            } else {
                alert('Please fill in both title and message');
            }
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
