<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - University Comm Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h2 { margin-bottom: 30px; text-align: center; font-size: 1.2em; }
        .sidebar nav a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 5px 0;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .sidebar nav a:hover { background: rgba(255,255,255,0.2); }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h3 { margin-bottom: 15px; color: #333; }
        .course-list { list-style: none; }
        .course-list li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .grade { color: #27ae60; font-weight: bold; }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #c0392b; }
        .announcement {
            background: #fef9e7;
            padding: 15px;
            border-left: 4px solid #f39c12;
            margin-bottom: 10px;
        }
        .message-item {
            background: #f0f0f0;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .new-message {
            background: #e3f2fd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            background: #27ae60;
            height: 20px;
            color: white;
            text-align: center;
            font-size: 12px;
            line-height: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📚 STUDENT HUB</h2>
        <nav>
            <a href="#" onclick="showSection('courses')">📖 MY COURSES</a>
            <a href="#" onclick="showSection('messages')">💬 MESSAGES</a>
            <a href="#" onclick="showSection('announcements')">📢 ANNOUNCEMENTS</a>
            <a href="#" onclick="showSection('grades')">📊 GRADES</a>
        </nav>
    </div>
    <div class="main-content">
        <div class="header">
            <h2>Welcome, <span id="userName"></span>!</h2>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="courses" class="section">
            <div class="card">
                <h3>My Enrolled Courses</h3>
                <ul class="course-list" id="coursesList"></ul>
            </div>
        </div>

        <div id="messages" class="section" style="display:none;">
            <div class="card">
                <h3>Messages</h3>
                <div id="messagesList"></div>
                <div style="margin-top: 20px;">
                    <h4>Send New Message</h4>
                    <select id="recipientSelect">
                        <option>Select recipient</option>
                        <option>Lecturer - CS101</option>
                        <option>Lecturer - WD201</option>
                        <option>Course Coordinator</option>
                    </select>
                    <textarea id="newMessage" rows="3" placeholder="Type your message..."></textarea>
                    <button onclick="sendMessage()">Send Message</button>
                </div>
            </div>
        </div>

        <div id="announcements" class="section" style="display:none;">
            <div class="card">
                <h3>Latest Announcements</h3>
                <div id="announcementsList"></div>
            </div>
        </div>

        <div id="grades" class="section" style="display:none;">
            <div class="card">
                <h3>My Grades</h3>
                <div id="gradesList"></div>
            </div>
            <div class="card">
                <h3>Overall Progress</h3>
                <div id="overallProgress"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/index.html';
        }
        
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').textContent = user.name || 'Student';
        
        const courses = [
            { name: 'Computer Science 101', code: 'CS101', instructor: 'Dr. Smith', progress: 85 },
            { name: 'Web Development', code: 'WD201', instructor: 'Prof. Johnson', progress: 72 },
            { name: 'Database Systems', code: 'DB301', instructor: 'Dr. Williams', progress: 90 }
        ];
        
        const grades = [
            { course: 'Computer Science 101', grade: 'A', percentage: 92, assignments: 5 },
            { course: 'Web Development', grade: 'B+', percentage: 87, assignments: 4 },
            { course: 'Database Systems', grade: 'A-', percentage: 90, assignments: 6 }
        ];
        
        const announcements = [
            { title: '📢 Exam Schedule', message: 'Final exams will be held from Dec 15-20', date: '2024-12-01' },
            { title: '📢 Library Hours', message: 'Library hours extended during exam week (8 AM - 12 AM)', date: '2024-12-02' },
            { title: '📢 Guest Lecture', message: 'Special guest lecture on AI on Friday at 10 AM in Hall A', date: '2024-12-03' }
        ];
        
        let messages = [
            { from: 'Dr. Smith', subject: 'Assignment Deadline', message: 'Assignment 3 is due next Friday', date: '2024-12-01', read: false },
            { from: 'Course Coordinator', subject: 'Course Registration', message: 'Next semester registration opens Dec 20', date: '2024-11-30', read: false },
            { from: 'Prof. Johnson', subject: 'Project Feedback', message: 'Great work on the midterm project!', date: '2024-11-28', read: true }
        ];
        
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
            if (section === 'courses') loadCourses();
            if (section === 'messages') loadMessages();
            if (section === 'announcements') loadAnnouncements();
            if (section === 'grades') loadGrades();
        }
        
        function loadCourses() {
            document.getElementById('coursesList').innerHTML = courses.map(c => `
                <li>
                    <div>
                        <strong>${c.name}</strong><br>
                        <small>${c.code} - Instructor: ${c.instructor}</small>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${c.progress}%">${c.progress}% Complete</div>
                        </div>
                    </div>
                    <button onclick="viewCourse('${c.code}')">View Details</button>
                </li>
            `).join('');
        }
        
        function loadMessages() {
            document.getElementById('messagesList').innerHTML = messages.map(m => `
                <div class="${m.read ? 'message-item' : 'new-message'}">
                    <strong>From: ${m.from}</strong><br>
                    <strong>Subject: ${m.subject}</strong><br>
                    ${m.message}<br>
                    <small>${m.date}</small>
                    <br><button onclick="markAsRead('${m.subject}')">Mark as Read</button>
                </div>
            `).join('');
        }
        
        function loadAnnouncements() {
            document.getElementById('announcementsList').innerHTML = announcements.map(a => `
                <div class="announcement">
                    <strong>${a.title}</strong><br>
                    ${a.message}<br>
                    <small>${a.date}</small>
                </div>
            `).join('');
        }
        
        function loadGrades() {
            const totalPercentage = grades.reduce((sum, g) => sum + g.percentage, 0) / grades.length;
            document.getElementById('gradesList').innerHTML = `
                <ul class="course-list">
                    ${grades.map(g => `
                        <li>
                            <div>
                                <strong>${g.course}</strong><br>
                                Assignments: ${g.assignments} completed
                            </div>
                            <div class="grade">${g.grade} (${g.percentage}%)</div>
                        </li>
                    `).join('')}
                </ul>
            `;
            document.getElementById('overallProgress').innerHTML = `
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${totalPercentage}%">Overall: ${Math.round(totalPercentage)}%</div>
                </div>
                <p>GPA: 3.6/4.0</p>
                <p>Credits Earned: 45/120</p>
            `;
        }
        
        function sendMessage() {
            const recipient = document.getElementById('recipientSelect').value;
            const message = document.getElementById('newMessage').value;
            if (recipient !== 'Select recipient' && message) {
                messages.unshift({
                    from: 'You',
                    subject:` Message to ${recipient}`,
                    message: message,
                    date: new Date().toISOString().split('T')[0],
                    read: true
                });
                alert('Message sent successfully!');
                document.getElementById('newMessage').value = '';
                loadMessages();
            } else {
                alert('Please select a recipient and enter a message');
            }
        }
        
        function viewCourse(courseCode) {
            alert(`Viewing details for course: ${courseCode}`);
        }
        
        function markAsRead(subject) {
            const message = messages.find(m => m.subject === subject);
            if (message) message.read = true;
            loadMessages();
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
        
        loadCourses();
    </script>
</body>
</html>
