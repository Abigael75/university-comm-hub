<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You are offline</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 2rem; background: #f5f5f5; }
    .container { max-width: 400px; margin: auto; background: white; border-radius: 24px; padding: 2rem; }
    button { background: #1976d2; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📡 No internet connection</h2>
    <p>Please check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
